# ================================ 全局配置 ================================

# 全局抓取与评估间隔
global:
    # 指标抓取间隔，每隔 15 秒从目标拉取一次数据
    scrape_interval: 15s
    # 规则评估间隔，每隔 15 秒执行一次告警规则计算
    evaluation_interval: 15s

# 告警管理器配置（暂无告警接收端时注释掉，按需启用）
# alerting:
#     alertmanagers:
#         - static_configs:
#             - targets: []

# 规则文件加载列表
rule_files: []

# ================================ 抓取配置 ================================

scrape_configs:
    # Prometheus Server 自身指标
    - job_name: "prometheus"
      static_configs:
          - targets: ["localhost:9090"]

    # Spring Boot Actuator Prometheus 端点
    - job_name: "spring-boot-app"
      # 指标暴露路径，与 Actuator 管理端点基路径拼接
      metrics_path: "/actuator/prometheus"
      static_configs:
          # 目标应用地址与端口
          - targets: ["localhost:8080"]
            # 实例标签，便于在 Grafana 中区分不同应用实例
            labels:
                instance: "spring-boot-prometheus-demo"

# ================================ 远程写入（阿里云 Prometheus） ================================

remote_write:
    # 阿里云 Prometheus 服务 Remote Write 端点
    - url: "https://<prometheus-instance-id>.apm-<region>.aliyuncs.com/prometheus/<prometheus-instance-id>/api/v1/write"

      # Basic Auth 认证配置
      basic_auth:
          # 阿里云 Prometheus 实例用户名，通常为 AccessKey ID 或实例用户名
          username: "<your-username>"
          # 阿里云 Prometheus 实例密码，通常为 AccessKey Secret 或实例密码
          password: "<your-password>"

      # 写入队列配置
      queue_config:
          # 最大分片数，提高写入吞吐量
          max_shards: 20
          # 最小分片数
          min_shards: 2
          # 每批次最大采样数
          max_samples_per_send: 2500
          # 批次超时时间
          batch_send_deadline: 30s
          # 重试次数上限
          max_retries: 3
          # 重试最小间隔
          min_backoff: 50ms
          # 重试最大间隔
          max_backoff: 1m

      # Remote Write 重标记配置（可选，按需调整标签）
      write_relabel_configs:
          # 移除 job 标签，避免在与阿里云托管 Prometheus 数据冲突时产生歧义
          - source_labels: ["job"]
            target_label: "exported_job"
            action: "replace"
